<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fashion Inspiration Library</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <div>
        <h1>Fashion Inspiration Library</h1>
        <p>Upload, classify, search, and filter fashion inspiration images.</p>
      </div>
      <div class="hero-actions">
        <button id="refreshBtn" class="secondary-btn">Refresh</button>
      </div>
    </header>

    <section class="panel upload-panel">
      <h2>Upload Image</h2>
      <form id="uploadForm" class="upload-form">
        <div class="field">
          <label for="fileInput">Image</label>
          <input id="fileInput" name="file" type="file" accept="image/*" required />
        </div>

        <div class="field">
          <label for="designerInput">Designer (optional)</label>
          <input id="designerInput" name="designer" type="text" placeholder="e.g. Rahul Mishra" />
        </div>

        <button type="submit" class="primary-btn">Upload & Classify</button>
      </form>
      <p id="uploadStatus" class="status-text"></p>
    </section>

    <section class="content-grid">
      <aside class="panel filter-panel">
        <h2>Search & Filters</h2>

        <div class="field">
          <label for="searchInput">Search</label>
          <input id="searchInput" type="text" placeholder="embroidered neckline, blazer, streetwear..." />
        </div>

        <div class="field">
          <label for="garmentTypeFilter">Garment Type</label>
          <select id="garmentTypeFilter">
            <option value="">All</option>
          </select>
        </div>

        <div class="field">
          <label for="styleFilter">Style</label>
          <select id="styleFilter">
            <option value="">All</option>
          </select>
        </div>

        <div class="field">
          <label for="materialFilter">Material</label>
          <select id="materialFilter">
            <option value="">All</option>
          </select>
        </div>

        <div class="field">
          <label for="occasionFilter">Occasion</label>
          <select id="occasionFilter">
            <option value="">All</option>
          </select>
        </div>

        <div class="field">
          <label for="seasonFilter">Season</label>
          <select id="seasonFilter">
            <option value="">All</option>
          </select>
        </div>

        <div class="field">
          <label for="countryFilter">Country</label>
          <select id="countryFilter">
            <option value="">All</option>
          </select>
        </div>

        <div class="field">
          <label for="designerFilter">Designer</label>
          <select id="designerFilter">
            <option value="">All</option>
          </select>
        </div>

        <div class="filter-actions">
          <button id="applyFiltersBtn" class="primary-btn" type="button">Apply</button>
          <button id="clearFiltersBtn" class="secondary-btn" type="button">Clear</button>
        </div>
      </aside>

      <section class="panel gallery-panel">
        <div class="gallery-header">
          <h2>Gallery</h2>
          <p id="resultsMeta">Loading...</p>
        </div>

        <div id="emptyState" class="empty-state hidden">
          No images found yet. Upload one to get started.
        </div>

        <div id="gallery" class="gallery-grid"></div>
      </section>
    </section>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
